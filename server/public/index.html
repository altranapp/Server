<!DOCTYPE html>
<html>
<head>
  <title>Crypto Investment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Crypto Investment</h1>

<div class="box">
  <h2>Register</h2>
  <input id="regEmail" placeholder="Email">
  <input id="regPassword" type="password" placeholder="Password">
  <button onclick="register()">Create Account</button>
</div>

<div class="box">
  <h2>Login</h2>
  <input id="logEmail" placeholder="Email">
  <input id="logPassword" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script src="app.js"></script>

<script>
async function login() {
  const email = document.getElementById("logEmail").value;
  const password = document.getElementById("logPassword").value;

  const res = await fetch("https://crypto-app-y5vn.onrender.com/api/auth/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("token", data.token); // ✅ save token
    window.location.href = "dashboard.html";   // ✅ go to dashboard
  } else {
    alert(data.message);
  }
}
</script>  

</body>
</html>
