<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .header {
      background: #1c2541;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1c2541;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: gold;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="header">Dashboard</div>

<div class="container">

  <div class="card">
    <h3>Welcome</h3>
    <p id="userEmail">Loading...</p>
  </div>

  <div class="card">
    <h3>Balance</h3>
    <p id="balance">$0</p>
  </div>

  <div class="card">
    <h3>Deposit</h3>
    <input type="number" id="depositAmount" placeholder="Amount"/>
    <button onclick="deposit()">Deposit</button>
  </div>

  <div class="card">
    <h3>Withdraw</h3>
    <input type="number" id="withdrawAmount" placeholder="Amount"/>
    <button onclick="withdraw()">Withdraw</button>
  </div>

  <button onclick="logout()">Logout</button>

</div>

<script>
const API = "https://crypto-app-y5vn.onrender.com";

async function loadUser() {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "index.html";
    return;
  }

  try {
    const res = await fetch(API + "/api/user/profile", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const user = await res.json();

    document.getElementById("userEmail").innerText = user.email;
    document.getElementById("balance").innerText = "$" + user.balance;

  } catch (err) {
    alert("Session expired");
    logout();
  }
}

async function deposit() {
  const amount = document.getElementById("depositAmount").value;

  const res = await fetch(API + "/api/user/deposit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId: localStorage.getItem("userId"),
      amount: Number(amount)
    })
  });

  const data = await res.json();
  alert(data.message);
  loadUser();
}

async function withdraw() {
  const amount = document.getElementById("withdrawAmount").value;

  const res = await fetch(API + "/api/user/withdraw", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId: localStorage.getItem("userId"),
      amount: Number(amount)
    })
  });

  const data = await res.json();
  alert(data.message);
  loadUser();
}

function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

loadUser();
</script>

</body>
</html>
