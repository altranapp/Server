<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>User Dashboard</h2>

  <div class="card">
    <h3>Account</h3>
    <p id="email"></p>
    <p class="balance" id="balance">$0</p>
    <p id="tier">Tier: None</p>
    <p id="profit">Profit: 0%</p>
  </div>

  <div class="card">
    <h3>Select Tier</h3>
    <button onclick="selectTier(1)">Tier 1 ($300)</button>
    <button onclick="selectTier(2)">Tier 2 ($500)</button>
    <button onclick="selectTier(3)">Tier 3 ($1000)</button>
  </div>

  <div class="card">
    <h3>Deposit</h3>
    <input id="depositAmount" type="number" placeholder="Amount">
    <button onclick="deposit()">Request Deposit</button>
  </div>

  <div class="card">
    <h3>Withdraw</h3>
    <input id="withdrawAmount" type="number" placeholder="Amount">
    <button onclick="withdraw()">Request Withdraw</button>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>

  <button onclick="logout()">Logout</button>

</div>

<script>
const API = "https://crypto-app-y5vn.onrender.com";
const token = localStorage.getItem("token");

// PROTECT PAGE
if (!token) window.location.href = "index.html";

// LOAD USER
async function loadUser() {
  const res = await fetch(API + "/api/user/profile", {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  email.innerText = data.email;
  balance.innerText = "$" + data.balance;
  tier.innerText = "Tier: " + (data.tier || "None");
  profit.innerText = "Profit: " + (data.dailyProfitRate * 100 || 0) + "%";
}

// SELECT TIER
async function selectTier(tier) {
  const res = await fetch(API + "/api/user/select-tier", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ tier })
  });

  const data = await res.json();
  alert(data.message);
  loadUser();
}

// DEPOSIT
async function deposit() {
  const amount = Number(depositAmount.value);

  const res = await fetch(API + "/api/user/request-deposit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ amount })
  });

  const data = await res.json();
  alert(data.message);
}

// WITHDRAW
async function withdraw() {
  const amount = Number(withdrawAmount.value);

  const res = await fetch(API + "/api/user/request-withdraw", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ amount })
  });

  const data = await res.json();
  alert(data.message);
}

// HISTORY
async function loadHistory() {
  const res = await fetch(API + "/api/user/transactions", {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  let html = "";
  data.forEach(tx => {
    html += `<p>${tx.type} - $${tx.amount} (${tx.status})</p>`;
  });

  history.innerHTML = html;
}

// LOGOUT
function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

// INIT
loadUser();
loadHistory();
</script>

</body>
</html>
